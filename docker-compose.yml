services:
  postgres:
    image: postgres:16-alpine
    container_name: vn-postgres
    environment:
      POSTGRES_DB: vn_db
      POSTGRES_USER: vn_user
      POSTGRES_PASSWORD: vn_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vn_user -d vn_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: vn-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vn_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
